<svg width="600" height="60" viewBox="0 0 600 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .glow-shadow-pink {
        font-family: 'Share Tech Mono', monospace;
        font-weight: 700;
        font-size: 24px;
        text-anchor: middle;
        letter-spacing: 0.12em;
        fill: #ff2d78;
        opacity: 0;
        animation: glitch-pink 1.5s cubic-bezier(0.19, 1, 0.22, 1) both;
      }
      
      .glow-shadow-cyan {
        font-family: 'Share Tech Mono', monospace;
        font-weight: 700;
        font-size: 24px;
        text-anchor: middle;
        letter-spacing: 0.12em;
        fill: #02d7f2;
        opacity: 0;
        animation: glitch-cyan 1.5s cubic-bezier(0.19, 1, 0.22, 1) both;
      }
      
      .main-text {
        font-family: 'Share Tech Mono', monospace;
        font-weight: 700;
        font-size: 24px;
        text-anchor: middle;
        letter-spacing: 0.12em;
        fill: #f8e602;
        opacity: 0;
        animation: glitch-main 1.5s cubic-bezier(0.19, 1, 0.22, 1) both;
      }

      @keyframes glitch-pink {
        0% { opacity: 0; transform: translate(-6px, 2px) skewX(-15deg); }
        20% { opacity: 0.7; transform: translate(3px, -1px) skewX(10deg); }
        35% { opacity: 0.2; transform: translate(-2px, 1px) skewX(-5deg); }
        50% { opacity: 0.8; transform: translate(2px, 0px) skewX(2deg); }
        65% { opacity: 0.5; transform: translate(-1px, -1px) skewX(0deg); }
        80% { opacity: 0.7; transform: translate(1px, 1px) skewX(0deg); }
        100% { opacity: 0.75; transform: translate(2px, 1px); }
      }

      @keyframes glitch-cyan {
        0% { opacity: 0; transform: translate(6px, -2px) skewX(15deg); }
        20% { opacity: 0.7; transform: translate(-3px, 1px) skewX(-10deg); }
        35% { opacity: 0.2; transform: translate(2px, -1px) skewX(5deg); }
        50% { opacity: 0.8; transform: translate(-2px, 0px) skewX(-2deg); }
        65% { opacity: 0.5; transform: translate(1px, 1px) skewX(0deg); }
        80% { opacity: 0.7; transform: translate(-1px, -1px) skewX(0deg); }
        100% { opacity: 0.75; transform: translate(-2px, -1px); }
      }

      @keyframes glitch-main {
        0% { opacity: 0; transform: scaleX(0.7) skewX(-15deg); filter: blur(4px) brightness(2); }
        15% { opacity: 0.8; transform: scaleX(1.05) skewX(10deg); filter: blur(1px) brightness(1.3); }
        30% { opacity: 0.3; transform: scaleX(0.95) skewX(-5deg); filter: blur(2px) brightness(1.6); }
        45% { opacity: 1; transform: scaleX(1.01) skewX(2deg); filter: blur(0.2px) brightness(1.1); }
        60% { opacity: 0.8; transform: scaleX(0.99) skewX(-1deg); }
        100% { opacity: 1; transform: scaleX(1) skewX(0deg); filter: blur(0px) brightness(1); }
      }
    </style>
  </defs>
  <text x="300" y="38" class="glow-shadow-pink">&gt; CREDENTIALS</text>
  <text x="300" y="38" class="glow-shadow-cyan">&gt; CREDENTIALS</text>
  <text x="300" y="38" class="main-text">&gt; CREDENTIALS</text>
</svg>
